# fly.toml app configuration file generated for awal-app on 2026-04-21T23:16:27Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'awal-app'
primary_region = 'iad'

[build]

[env]
  HOSTNAME = '0.0.0.0'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
