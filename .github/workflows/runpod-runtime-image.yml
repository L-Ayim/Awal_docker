name: RunPod runtime image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "deploy/runpod/Dockerfile.runtime"
      - "deploy/runpod/bootstrap-runpod.sh"
      - "deploy/runpod/vllm/**"
      - "requirements-docling-service.txt"
      - "requirements-embedding-service.txt"
      - "requirements-rerank-service.txt"
      - "scripts/docling_service.py"
      - "scripts/embedding_service.py"
      - "scripts/rerank_service.py"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/l-ayim/awal-runpod-runtime

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/runpod/Dockerfile.runtime
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
