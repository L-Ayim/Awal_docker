services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: awal-vllm
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - >
        mkdir -p "${HF_HOME:-/workspace/hf-cache}" &&
        vllm serve "${VLLM_MODEL:-Qwen/Qwen3-32B}"
        --host 0.0.0.0
        --port 8000
        --api-key "${VLLM_API_KEY:-awal-runpod-key}"
        --dtype auto
        --generation-config vllm
        --enforce-eager
        --max-model-len "${VLLM_MAX_MODEL_LEN:-8192}"
        --gpu-memory-utilization "${VLLM_GPU_MEMORY_UTILIZATION:-0.88}"
    ports:
      - "${PUBLIC_VLLM_PORT:-8000}:8000"
    environment:
      HF_HOME: ${HF_HOME:-/workspace/hf-cache}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - /workspace:/workspace
    gpus: all

  embeddings:
    build:
      context: ../..
      dockerfile: deploy/vast/embeddings/Dockerfile
    container_name: awal-embeddings
    restart: unless-stopped
    ports:
      - "${PUBLIC_EMBEDDING_PORT:-8020}:8020"
    environment:
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-awal-embedding-key}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
    volumes:
      - /workspace:/workspace
    gpus: all

  rerank:
    build:
      context: ../..
      dockerfile: deploy/vast/rerank/Dockerfile
    container_name: awal-rerank
    restart: unless-stopped
    profiles: ["rerank"]
    ports:
      - "${PUBLIC_RERANK_PORT:-8030}:8030"
    environment:
      RERANK_API_KEY: ${RERANK_API_KEY:-awal-rerank-key}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
    volumes:
      - /workspace:/workspace
    gpus: all

  docling:
    build:
      context: ../..
      dockerfile: deploy/vast/docling/Dockerfile
    container_name: awal-docling
    restart: unless-stopped
    ports:
      - "${PUBLIC_DOCLING_PORT:-8010}:8010"
    environment:
      DOC_PROCESSOR_API_KEY: ${DOC_PROCESSOR_API_KEY:-awal-docling-key}
      DOCLING_DEVICE: ${DOCLING_DEVICE:-cuda}
    volumes:
      - /workspace:/workspace
    gpus: all
